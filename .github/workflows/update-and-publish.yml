name: Update and publish AUR package

on:
  push:
    branches: [master]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-publish:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    env:
      PKGBASE: pangolin-bin
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Install dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git curl jq openssh rsync pacman-contrib sudo

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Mark workspace as safe git directory
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Create builder user
        run: |
          set -euo pipefail
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Read current version and release
        id: current
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          current_pkgver=$(sed -n 's/^pkgver=//p' PKGBUILD)
          current_pkgrel=$(sed -n 's/^pkgrel=//p' PKGBUILD)
          echo "pkgver=${current_pkgver}" >> "$GITHUB_OUTPUT"
          echo "pkgrel=${current_pkgrel}" >> "$GITHUB_OUTPUT"

      - name: Get latest upstream release
        id: upstream
        run: |
          set -euo pipefail
          latest_tag=$(curl -fsSL https://api.github.com/repos/fosrl/cli/releases/latest | jq -r '.tag_name')
          test -n "$latest_tag"
          test "$latest_tag" != "null"
          latest_version="${latest_tag#v}"
          echo "tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${latest_version}" >> "$GITHUB_OUTPUT"

      - name: Check if upstream update is needed
        id: compare
        run: |
          set -euo pipefail
          if [ "${{ steps.current.outputs.pkgver }}" = "${{ steps.upstream.outputs.version }}" ]; then
            echo "upstream_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "upstream_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect packaging changes in push
        id: packaging
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          packaging_changed=false

          if [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [ "$before" = "0000000000000000000000000000000000000000" ]; then
              changed_files=$(git show --pretty="" --name-only "$after" || true)
            else
              changed_files=$(git diff --name-only "$before" "$after" || true)
            fi

            printf '%s\n' "$changed_files"

            if printf '%s\n' "$changed_files" | grep -Eq '^(PKGBUILD|pangolin-bin\.install)$'; then
              packaging_changed=true
            fi
          fi

          echo "packaging_changed=${packaging_changed}" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD version for new upstream release
        if: steps.compare.outputs.upstream_changed == 'true'
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          sed -i "s/^pkgver=.*/pkgver=${{ steps.upstream.outputs.version }}/" PKGBUILD
          sed -i 's/^pkgrel=.*/pkgrel=1/' PKGBUILD
          chown builder:builder PKGBUILD

      - name: Bump pkgrel for manual packaging changes
        if: steps.compare.outputs.upstream_changed != 'true' && steps.packaging.outputs.packaging_changed == 'true'
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          current_pkgrel=$(sed -n 's/^pkgrel=//p' PKGBUILD)
          next_pkgrel=$((current_pkgrel + 1))
          sed -i "s/^pkgrel=.*/pkgrel=${next_pkgrel}/" PKGBUILD
          chown builder:builder PKGBUILD

      - name: Refresh checksums
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          BASE="https://github.com/fosrl/cli/releases/download/${{ steps.upstream.outputs.tag }}"

          sha_x86_64=$(curl -fsL "${BASE}/pangolin-cli_linux_amd64" | sha256sum | awk '{print $1}')
          sha_aarch64=$(curl -fsL "${BASE}/pangolin-cli_linux_arm64" | sha256sum | awk '{print $1}')
          sha_armv7h=$(curl -fsL "${BASE}/pangolin-cli_linux_arm32" | sha256sum | awk '{print $1}')
          sha_armv6h=$(curl -fsL "${BASE}/pangolin-cli_linux_arm32v6" | sha256sum | awk '{print $1}')
          sha_riscv64=$(curl -fsL "${BASE}/pangolin-cli_linux_riscv64" | sha256sum | awk '{print $1}')

          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${sha_x86_64}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${sha_aarch64}')/" PKGBUILD
          sed -i "s/^sha256sums_armv7h=.*/sha256sums_armv7h=('${sha_armv7h}')/" PKGBUILD
          sed -i "s/^sha256sums_armv6h=.*/sha256sums_armv6h=('${sha_armv6h}')/" PKGBUILD
          sed -i "s/^sha256sums_riscv64=.*/sha256sums_riscv64=('${sha_riscv64}')/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          set -euo pipefail
          sudo -u builder env GITHUB_WORKSPACE="$GITHUB_WORKSPACE" bash -lc '
            set -euo pipefail
            cd "$GITHUB_WORKSPACE"
            makepkg --printsrcinfo > .SRCINFO
          '

      - name: Commit and push to GitHub if needed
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO

          if git diff --cached --quiet; then
            echo "No GitHub changes to commit."
          else
            if [ "${{ steps.compare.outputs.upstream_changed }}" = "true" ]; then
              commit_msg="Update pangolin-bin to ${{ steps.upstream.outputs.version }}"
            elif [ "${{ steps.packaging.outputs.packaging_changed }}" = "true" ]; then
              commit_msg="Bump pkgrel for packaging changes"
            else
              commit_msg="Sync PKGBUILD metadata"
            fi

            git commit -m "$commit_msg"
            git push origin HEAD:master
          fi

      - name: Setup SSH for AUR
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/aur"
          chmod 600 "$HOME/.ssh/aur"
          ssh-keyscan -H aur.archlinux.org >> "$HOME/.ssh/known_hosts" 2>/dev/null
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Test SSH connection to AUR
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/aur" \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              -T aur@aur.archlinux.org || true

      - name: Clone AUR repository
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          rm -rf aur-repo
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          git clone "ssh://aur@aur.archlinux.org/${PKGBASE}.git" aur-repo

      - name: Mark git directories as safe
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/aur-repo"

      - name: Sync files to AUR
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          rsync -av --delete \
            --exclude='.git' \
            --include='PKGBUILD' \
            --include='.SRCINFO' \
            --include='pangolin-bin.install' \
            --exclude='*' \
            ./ aur-repo/

      - name: Commit and push to AUR if needed
        working-directory: ${{ github.workspace }}/aur-repo
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/aur-repo"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No AUR changes to push."
            exit 0
          fi

          if [ "${{ steps.compare.outputs.upstream_changed }}" = "true" ]; then
            commit_msg="Update pangolin-bin to ${{ steps.upstream.outputs.version }}"
          elif [ "${{ steps.packaging.outputs.packaging_changed }}" = "true" ]; then
            commit_msg="Bump pkgrel for packaging changes"
          else
            commit_msg="Sync package files from GitHub"
          fi

          git commit -m "$commit_msg"
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          git push
